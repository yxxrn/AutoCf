name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "auto_freecf/**"
      - "*.py"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/ci.yml"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - run: python -m compileall auto_freecf cf_workerai_manager.py
      - run: auto-freecf --help
